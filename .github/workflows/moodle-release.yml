# See https://github.com/moodlehq/moodle-plugin-release
#
# Whenever a new tag starting with "v" is pushed, publish the version
# to the Moodle Plugins directory at https://moodle.org/plugins
#
# Required secret: MOODLE_ORG_TOKEN
# (generate at https://moodle.org/user/profile.php → Security keys)
#
name: Releasing in the Plugins directory

on:
  push:
    tags:
      - v*

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to be released'
        required: true

defaults:
  run:
    shell: bash

jobs:
  release-at-moodle-org:
    runs-on: ubuntu-latest
    env:
      PLUGIN: block_teacher_checklist
      CURL: curl -s
      ENDPOINT: https://moodle.org/webservice/rest/server.php
      TOKEN: ${{ secrets.MOODLE_ORG_TOKEN }}
      FUNCTION: local_plugins_add_version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine tag name
        id: get-tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAGNAME="${{ github.event.inputs.tag }}"
          elif [[ $GITHUB_REF = refs/tags/* ]]; then
            TAGNAME="${GITHUB_REF##*/}"
          fi
          if [[ -z "${TAGNAME}" ]]; then
            echo "No tag name has been provided!"
            exit 1
          fi
          echo "tagname=${TAGNAME}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGES.md
        id: release-notes
        run: |
          TAGNAME="${{ steps.get-tag.outputs.tagname }}"
          NOTES=$(awk "/^\#\# \[${TAGNAME}\]/{found=1; next} found && /^\-\-\-/{exit} found && /^\#\# /{exit} found{print}" CHANGES.md)
          if [[ -z "${NOTES}" ]]; then
            NOTES="Release ${TAGNAME}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${NOTES}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Call the service function
        id: add-version
        env:
          NOTES: ${{ steps.release-notes.outputs.notes }}
        run: |
          TAGNAME="${{ steps.get-tag.outputs.tagname }}"
          ZIPURL="https://api.github.com/repos/${{ github.repository }}/zipball/${TAGNAME}"
          RESPONSE=$(${CURL} ${ENDPOINT} \
            --data-urlencode "wstoken=${TOKEN}" \
            --data-urlencode "wsfunction=${FUNCTION}" \
            --data-urlencode "moodlewsrestformat=json" \
            --data-urlencode "frankenstyle=${PLUGIN}" \
            --data-urlencode "zipurl=${ZIPURL}" \
            --data-urlencode "vcssystem=git" \
            --data-urlencode "vcsrepositoryurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --data-urlencode "vcstag=${TAGNAME}" \
            --data-urlencode "changelogurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${TAGNAME}/CHANGES.md" \
            --data-urlencode "altdownloadurl=${ZIPURL}" \
            --data-urlencode "version_options[renameroot]=1" \
            --data-urlencode "version_options[autoremove]=1" \
            --data-urlencode "version_options[renamereadme]=1" \
            --data-urlencode "version_softwareversion[Moodle][]=47" \
            --data-urlencode "version_softwareversion[Moodle][]=48" \
            --data-urlencode "version_softwareversion[Moodle][]=50" \
            --data-urlencode "version_softwareversion[Moodle][]=51" \
            --data-urlencode "notes=${NOTES}")
          echo "response=${RESPONSE}" >> $GITHUB_OUTPUT

      - name: Evaluate the response
        id: evaluate-response
        env:
          RESPONSE: ${{ steps.add-version.outputs.response }}
        run: |
          jq <<< ${RESPONSE}
          jq --exit-status ".id" <<< ${RESPONSE} > /dev/null
